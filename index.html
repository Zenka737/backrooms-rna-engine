<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backrooms — RNA Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #fps-counter {
            position: fixed;
            top: 10px;
            right: 10px;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 4px;
            pointer-events: none;
            user-select: none;
            display: none;
        }
        #fps-counter.visible {
            display: block;
        }
        #sanity-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 8px;
            background: rgba(0,0,0,0.7);
            border-radius: 4px;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
        }
        #sanity-fill {
            width: 100%;
            height: 100%;
            background: #4CAF50;
            transition: width 0.3s ease;
        }
        #sanity-label {
            position: fixed;
            bottom: 42px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            z-index: 1000;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }
        #level-info {
            position: fixed;
            top: 10px;
            left: 10px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            z-index: 1000;
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 4px;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 24px;
            z-index: 2000;
            font-family: 'Courier New', monospace;
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 30px 50px;
            border-radius: 8px;
            text-align: center;
        }
        #loading .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #controls-hint {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            z-index: 1000;
            font-family: 'Courier New', monospace;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <!-- FPS Counter -->
    <div id="fps-counter">
        FPS: <span id="fps-value">0</span>
    </div>

    <!-- UI Overlay -->
    <div id="ui-overlay">
        <div id="level-info">Уровень 0: The Lobby</div>
        <div id="sanity-label">РАССУДОК</div>
        <div id="sanity-bar">
            <div id="sanity-fill" style="width:100%"></div>
        </div>
        <div id="controls-hint">
            WASD — движение | ← → — поворот | Mouse — осмотр | Enter — играть
        </div>
    </div>

    <!-- Loading -->
    <div id="loading">
        <div>ЗАГРУЗКА УРОВНЯ</div>
        <div class="spinner"></div>
    </div>

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <script type="importmap">
        {
            "imports": {
                "./src/": "./src/"
            }
        }
    </script>
    <script type="module">
        import { Game } from './src/Game.js';
        const game = new Game();
        game.start();
    </script>
</body>
</html>
