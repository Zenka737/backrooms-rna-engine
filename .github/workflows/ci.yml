name: CI — Code Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  syntax-check:
    name: JS — Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check JS syntax
        run: |
          echo "Проверяем синтаксис JS файлов..."
          find src -name "*.js" | while read f; do
            node --check "$f" && echo "✅ $f" || { echo "❌ $f"; exit 1; }
          done

  debug-check:
    name: No Debug Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for debug artifacts
        run: |
          echo "Проверяем на debug-артефакты..."
          FOUND=0
          if grep -rn "debugger" src/; then
            echo "❌ Найден оператор debugger"
            FOUND=1
          fi
          if grep -rnP "console\.(warn|error|debug|trace|dir)" src/; then
            echo "❌ Найдены отладочные console методы"
            FOUND=1
          fi
          if grep -rn "TODO\|FIXME\|HACK" src/; then
            echo "⚠️  Найдены TODO/FIXME комментарии"
          fi
          if [ $FOUND -eq 1 ]; then exit 1; fi
          echo "✅ Debug-артефактов не найдено"

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for security issues
        run: |
          echo "Проверяем безопасность..."
          FOUND=0
          if grep -rn "eval(" src/; then
            echo "❌ Найден eval()"
            FOUND=1
          fi
          if grep -rn "document\.write(" src/; then
            echo "❌ Найден document.write()"
            FOUND=1
          fi
          if [ $FOUND -eq 1 ]; then exit 1; fi
          echo "✅ Критических уязвимостей не найдено"

  html-check:
    name: HTML — HTMLHint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-save htmlhint
      - run: npx htmlhint index.html
